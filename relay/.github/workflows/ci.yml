name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: relay
          POSTGRES_PASSWORD: relay
          POSTGRES_DB: relay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relay -d relay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://relay:relay@localhost:5432/relay

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: vp install
      # apps/admin is intentionally outside the vp workspace (its own Vite 8
      # toolchain), so `vp install` doesn't install it — but `vp check` still
      # type-checks its tsconfig. Install its deps so that check resolves.
      - name: Install admin app deps
        run: cd apps/admin && bun install --frozen-lockfile
      - run: vp run db:migrate
      - name: Build workspace packages
        run: vp run -r build
      - run: vp check
      - run: vp run -r test
