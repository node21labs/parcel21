<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Parcel21 — a private, secure marketplace</title>
    <meta name="description" content="Buy and sell cameras, furniture, watches and the well-made rest, with payments that settle privately on Bitcoin — straight to the seller, with no platform that can watch, take a cut, or block it." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;1,18..72,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #FBFAF6; --ink: #1C1B18; --acc: #C8501E; --mut: #76726A; --mut2: #9c988e; --body: #46443f;
        --line: rgba(28,27,24,0.08); --line2: rgba(28,27,24,0.14); --panel: #F4F2EC; --card: #fff;
        --grn: #2f9e5b; --blu: #2f6fd6; --vio: #6d5bd0;
        --sans: 'Hanken Grotesk', system-ui, sans-serif; --serif: 'Newsreader', Georgia, serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; }
      ::selection { background: var(--acc); color: #fff; }
      a { color: inherit; text-decoration: none; }
      button { font-family: var(--sans); letter-spacing: -0.01em; }
      input::placeholder { color: var(--mut2); }
      .p21-scroll::-webkit-scrollbar { width: 0; height: 0; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
      @keyframes drawerIn { from { transform: translateX(100%); } to { transform: none; } }
      @keyframes toastIn { from { opacity: 0; transform: translateY(16px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
      @keyframes spin { to { transform: rotate(360deg); } }

      .wrap { max-width: 1320px; margin: 0 auto; padding: 0 44px; }
      .serif { font-family: var(--serif); font-weight: 400; }
      .ital { font-style: italic; }

      header.site { position: sticky; top: 0; z-index: 40; background: rgba(251,250,246,0.86); backdrop-filter: saturate(140%) blur(14px); border-bottom: 1px solid var(--line); }
      header.site .bar { display: flex; align-items: center; gap: 20px; padding-top: 16px; padding-bottom: 16px; }
      .logo { display: flex; align-items: baseline; gap: 1px; background: none; border: 0; cursor: pointer; flex-shrink: 0; }
      .logo b { font-weight: 700; font-size: 23px; letter-spacing: -0.04em; }
      .logo .o { color: var(--acc); }
      .search { flex: 1; min-width: 0; max-width: 540px; position: relative; display: flex; align-items: center; }
      .search svg { position: absolute; left: 15px; pointer-events: none; }
      .search input { width: 100%; font-family: var(--sans); font-size: 15px; color: var(--ink); background: #fff; border: 1px solid var(--line2); border-radius: 11px; padding: 12px 16px 12px 42px; outline: none; letter-spacing: -0.01em; }
      .search input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px rgba(200,80,30,0.1); }
      nav.head { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; }
      .btn-sell { display: flex; align-items: center; gap: 7px; background: var(--ink); color: var(--bg); border: 0; cursor: pointer; font-weight: 600; font-size: 14px; padding: 11px 17px; border-radius: 10px; }
      .btn-sell:hover { background: #000; }
      .ic-btn { position: relative; background: none; border: 0; cursor: pointer; padding: 9px; border-radius: 10px; color: var(--ink); display: flex; }
      .ic-btn:hover { background: rgba(28,27,24,0.05); }
      .ic-badge { position: absolute; top: 1px; right: 1px; background: var(--acc); color: #fff; font-size: 10px; font-weight: 700; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
      .avatar { width: 34px; height: 34px; border-radius: 50%; background: #E1DDD6; display: grid; place-items: center; font-weight: 600; font-size: 13px; color: var(--mut); margin-left: 4px; border: 1px solid var(--line); }

      /* trust strip — the positioning */
      .trust { background: var(--ink); color: #efe9df; }
      .trust .wrap { display: flex; align-items: center; justify-content: center; gap: 18px; padding: 9px 44px; font-size: 12.5px; flex-wrap: wrap; }
      .trust .t { display: inline-flex; align-items: center; gap: 7px; color: #cfc8bb; }
      .trust .t b { color: #fff; font-weight: 600; }
      .trust .t svg { color: var(--acc); }
      .trust .pow { color: #8d8678; }

      main { animation: fade 0.3s ease both; }

      /* hero */
      .hero { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 40px; align-items: center; padding: 60px 0 52px; }
      .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--acc); margin-bottom: 20px; }
      .eyebrow span { width: 22px; height: 1.5px; background: var(--acc); }
      .hero h1 { font-family: var(--serif); font-size: 60px; line-height: 1.02; letter-spacing: -0.02em; margin-bottom: 20px; text-wrap: balance; }
      .hero p { font-size: 17px; line-height: 1.6; color: var(--mut); max-width: 450px; margin-bottom: 28px; }
      .hero .cta { display: flex; gap: 12px; flex-wrap: wrap; }
      .btn-dark { background: var(--ink); color: var(--bg); border: 0; cursor: pointer; font-weight: 600; font-size: 15px; padding: 14px 24px; border-radius: 11px; }
      .btn-dark:hover { background: #000; }
      .btn-ghost { background: none; color: var(--ink); border: 1px solid var(--line2); cursor: pointer; font-weight: 600; font-size: 15px; padding: 14px 24px; border-radius: 11px; }
      .btn-ghost:hover { border-color: var(--ink); }
      .feat { position: relative; border: 0; cursor: pointer; padding: 0; text-align: left; border-radius: 18px; overflow: hidden; aspect-ratio: 4/3.4; display: block; width: 100%; transition: transform .4s cubic-bezier(.2,.7,.2,1); }
      .feat:hover { transform: translateY(-3px); }
      .feat .sheen { position: absolute; inset: 0; background: radial-gradient(120% 90% at 72% 22%, rgba(255,255,255,0.6), transparent 60%); }
      .feat .cat { position: absolute; top: 18px; left: 18px; z-index: 2; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #46443f; background: rgba(255,255,255,0.86); padding: 5px 10px; border-radius: 8px; backdrop-filter: blur(6px); }
      .feat .obj { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-style: italic; font-size: 34px; color: rgba(28,27,24,0.22); }
      .feat .cap { position: absolute; left: 0; right: 0; bottom: 0; padding: 22px; background: linear-gradient(to top, rgba(28,27,24,0.5), transparent); color: #fff; }
      .feat .cap .k { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; margin-bottom: 4px; }
      .feat .cap .n { font-family: var(--serif); font-size: 21px; line-height: 1.2; }
      .feat .cap .pr { font-weight: 600; font-size: 16px; margin-top: 6px; }

      /* category bar */
      .catbar { position: sticky; top: 67px; z-index: 30; background: rgba(251,250,246,0.92); backdrop-filter: blur(8px); margin: 0 -44px; padding: 13px 44px; border-bottom: 1px solid rgba(28,27,24,0.07); }
      .catbar .row { display: flex; gap: 8px; overflow-x: auto; }
      .chip { flex-shrink: 0; cursor: pointer; font-weight: 500; font-size: 14px; padding: 9px 16px; border-radius: 999px; white-space: nowrap; background: #fff; color: var(--body); border: 1px solid var(--line2); }
      .chip:hover { border-color: var(--ink); color: var(--ink); }
      .chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); font-weight: 600; }

      .feedhead { display: flex; align-items: flex-end; justify-content: space-between; padding: 34px 0 22px; gap: 20px; flex-wrap: wrap; }
      .feedhead h2 { font-family: var(--serif); font-size: 32px; letter-spacing: -0.01em; }
      .feedhead .sub { font-size: 14px; color: var(--mut); margin-top: 4px; }
      .sortwrap { display: flex; align-items: center; gap: 9px; position: relative; }
      .sortwrap span { font-size: 14px; color: var(--mut); }
      .sortwrap select { appearance: none; -webkit-appearance: none; font-family: var(--sans); font-weight: 600; font-size: 14px; color: var(--ink); background: #fff; border: 1px solid var(--line2); border-radius: 10px; padding: 10px 34px 10px 14px; cursor: pointer; outline: none; }
      .sortwrap svg { position: absolute; right: 12px; pointer-events: none; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px 26px; }
      .card { cursor: pointer; }
      .card .ph { position: relative; aspect-ratio: 4/5; border-radius: 14px; overflow: hidden; }
      .card .sheen { position: absolute; inset: 0; background: radial-gradient(115% 85% at 70% 22%, rgba(255,255,255,0.55), transparent 58%); }
      .card .cat { position: absolute; top: 12px; left: 12px; z-index: 2; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #46443f; background: rgba(255,255,255,0.86); padding: 4px 8px; border-radius: 7px; backdrop-filter: blur(6px); }
      .card .obj { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-style: italic; font-size: 26px; color: rgba(28,27,24,0.2); }
      .phimg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
      .heart { position: absolute; top: 11px; right: 11px; width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); border: 0; cursor: pointer; display: grid; place-items: center; }
      .heart:hover { background: #fff; transform: scale(1.08); }
      .card .meta { padding: 13px 2px 0; }
      .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
      .card .nm { font-family: var(--serif); font-size: 18px; line-height: 1.25; }
      .card .pr { font-weight: 700; font-size: 16px; white-space: nowrap; }
      .card .cond { display: flex; align-items: center; gap: 7px; margin-top: 6px; font-size: 13px; color: var(--mut); }
      .card .cond .d { opacity: 0.4; }
      .card .ship { font-size: 13px; color: var(--mut2); margin-top: 2px; }

      footer.site { border-top: 1px solid var(--line); background: var(--panel); margin-top: 40px; }
      footer.site .cols { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 32px; padding: 52px 44px 40px; max-width: 1320px; margin: 0 auto; }
      footer .blurb { font-size: 14px; line-height: 1.6; color: var(--mut); max-width: 280px; margin-top: 12px; }
      footer .ch { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mut2); margin-bottom: 15px; }
      footer .lk { display: flex; flex-direction: column; gap: 10px; font-size: 14px; color: var(--body); }
      footer .lk a:hover { color: var(--ink); }
      footer .legal { max-width: 1320px; margin: 0 auto; padding: 18px 44px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; font-size: 13px; color: var(--mut2); }

      /* product detail */
      .back { display: inline-flex; align-items: center; gap: 8px; background: none; border: 0; cursor: pointer; font-weight: 500; font-size: 14px; color: var(--mut); padding: 8px 0; margin-bottom: 16px; }
      .back:hover { color: var(--ink); }
      .pdp { max-width: 1180px; margin: 0 auto; padding: 24px 44px 80px; }
      .pdp .split { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 50px; align-items: start; }
      .gallery { position: sticky; top: 100px; }
      .gallery .main { position: relative; aspect-ratio: 1/1; border-radius: 18px; overflow: hidden; }
      .gallery .obj { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-style: italic; font-size: 46px; color: rgba(28,27,24,0.2); }
      .gallery .thumbs { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 12px; }
      .gallery .thumb { aspect-ratio: 1/1; border-radius: 11px; border: 1px solid var(--line); position: relative; overflow: hidden; }
      .pinfo .tags { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
      .pinfo .cat { font-size: 12px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; color: var(--acc); }
      .pinfo .cond { font-size: 12px; font-weight: 600; color: var(--body); background: rgba(28,27,24,0.06); padding: 4px 10px; border-radius: 999px; }
      .pinfo h1 { font-family: var(--serif); font-size: 40px; line-height: 1.1; letter-spacing: -0.01em; margin-bottom: 14px; text-wrap: balance; }
      .pinfo .price { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
      .pinfo .price b { font-weight: 700; font-size: 32px; }
      .pinfo .price .s { font-size: 14px; color: var(--mut); }
      .pinfo .desc { font-size: 16px; line-height: 1.65; color: var(--body); margin-bottom: 26px; max-width: 480px; }
      .pinfo .acts { display: flex; gap: 11px; margin-bottom: 13px; }
      .btn-buy { flex: 1; background: var(--acc); color: #fff; border: 0; cursor: pointer; font-weight: 600; font-size: 16px; padding: 16px; border-radius: 12px; }
      .btn-buy:hover { filter: brightness(0.93); }
      .btn-cart { flex: 1; background: var(--ink); color: var(--bg); border: 0; cursor: pointer; font-weight: 600; font-size: 16px; padding: 16px; border-radius: 12px; }
      .btn-cart:hover { background: #000; }
      .btn-fav { width: 54px; flex-shrink: 0; background: #fff; border: 1px solid var(--line2); cursor: pointer; border-radius: 12px; display: grid; place-items: center; }
      .btn-fav:hover { border-color: var(--ink); }
      .btn-offer { width: 100%; background: none; color: var(--ink); border: 1px solid var(--line2); cursor: pointer; font-weight: 600; font-size: 15px; padding: 14px; border-radius: 12px; margin-bottom: 24px; }
      .btn-offer:hover { border-color: var(--ink); }
      .seller { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1px solid var(--line2); border-radius: 14px; margin-bottom: 18px; }
      .seller .av { width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center; font-weight: 600; font-size: 15px; color: var(--body); flex-shrink: 0; }
      .seller .nm { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 15px; }
      .seller .meta { font-size: 13px; color: var(--mut); margin-top: 2px; }
      .seller .store { background: none; border: 1px solid var(--line2); cursor: pointer; font-weight: 600; font-size: 13px; padding: 9px 15px; border-radius: 9px; color: var(--ink); }
      .seller .store:hover { border-color: var(--ink); }
      .trustrow { display: flex; flex-direction: column; gap: 11px; }
      .trustrow .r { display: flex; align-items: flex-start; gap: 11px; font-size: 14px; color: var(--body); }
      .trustrow .r svg { color: var(--acc); flex-shrink: 0; margin-top: 1px; }
      .trustrow .r b { font-weight: 600; color: var(--ink); }
      .similar { margin-top: 64px; }
      .similar h2 { font-family: var(--serif); font-size: 26px; margin-bottom: 22px; }
      .simgrid { display: grid; grid-template-columns: repeat(4,1fr); gap: 26px; }

      /* checkout + receipt */
      .checkout { max-width: 1040px; margin: 0 auto; padding: 24px 44px 80px; }
      .checkout .split { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
      .summary { background: var(--card); border: 1px solid var(--line2); border-radius: 16px; padding: 22px; }
      .summary h3 { font-family: var(--serif); font-size: 22px; margin-bottom: 16px; }
      .sitem { display: flex; gap: 14px; padding-bottom: 16px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
      .sitem .ph { width: 66px; height: 80px; border-radius: 10px; flex-shrink: 0; position: relative; overflow: hidden; }
      .sitem .obj { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-style: italic; font-size: 14px; color: rgba(28,27,24,0.22); }
      .sitem .nm { font-family: var(--serif); font-size: 17px; line-height: 1.25; }
      .sitem .by { font-size: 13px; color: var(--mut); margin-top: 3px; }
      .srow { display: flex; justify-content: space-between; font-size: 14px; color: var(--mut); margin-bottom: 8px; }
      .srow.total { font-size: 17px; color: var(--ink); font-weight: 700; border-top: 1px solid var(--line); padding-top: 13px; margin-top: 5px; }
      .pay { background: var(--card); border: 1px solid var(--line2); border-radius: 16px; padding: 22px; }
      .pay .lede { font-size: 13.5px; color: var(--body); line-height: 1.6; margin: 6px 0 16px; }
      .pay .lede b { color: var(--ink); font-weight: 600; }
      .payways { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
      .payway { display: flex; align-items: center; gap: 11px; padding: 13px 14px; border: 1px solid var(--line); border-radius: 11px; font-size: 13.5px; color: var(--mut2); background: #fbfaf7; }
      .payway.on { border-color: var(--acc); background: rgba(200,80,30,0.05); color: var(--ink); box-shadow: 0 0 0 3px rgba(200,80,30,0.07); }
      .payway .ico { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; background: #fff; border: 1px solid var(--line); }
      .payway.on .ico { background: var(--acc); border-color: var(--acc); color: #fff; }
      .payway .t b { color: var(--ink); font-weight: 600; display: block; font-size: 14px; }
      .payway.on .t b { color: var(--ink); }
      .payway .t span { font-size: 12px; }
      .payway .pick { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--acc); }
      .btn-pay { width: 100%; background: var(--acc); color: #fff; border: 0; cursor: pointer; font-weight: 700; font-size: 16px; padding: 16px; border-radius: 12px; }
      .btn-pay:hover { filter: brightness(0.93); }
      .btn-pay:disabled { background: #d8d2c6; color: #fff; cursor: default; filter: none; }
      .demo-note { font-size: 11.5px; color: var(--mut2); text-align: center; margin-top: 11px; line-height: 1.5; }

      .beats { display: grid; gap: 10px; margin-top: 4px; }
      .beat { display: flex; align-items: center; gap: 13px; padding: 13px 14px; border: 1px solid var(--line); border-radius: 12px; opacity: 0.45; transition: opacity .3s, border-color .3s; }
      .beat.run, .beat.ok, .beat.error { opacity: 1; }
      .beat.run { border-color: rgba(200,80,30,0.4); }
      .beat.ok { border-color: rgba(47,158,91,0.34); }
      .beat .bic { width: 30px; height: 30px; flex: 0 0 30px; border-radius: 50%; border: 2px solid #d8d2c6; display: grid; place-items: center; font-size: 14px; color: transparent; }
      .beat.run .bic { border-color: var(--acc); border-right-color: transparent; animation: spin .8s linear infinite; }
      .beat.ok .bic { background: var(--grn); border-color: var(--grn); color: #fff; }
      .beat.error .bic { background: #d23; border-color: #d23; color: #fff; }
      .beat .bl { font-weight: 600; font-size: 14.5px; }
      .beat .bs { font-size: 12px; color: var(--mut); margin-top: 1px; }

      .receipt { max-width: 720px; margin: 0 auto; padding: 40px 44px 80px; animation: fadeUp 0.4s ease both; }
      .rhead { text-align: center; margin-bottom: 30px; }
      .rhead .ck { width: 56px; height: 56px; border-radius: 50%; background: var(--grn); color: #fff; display: grid; place-items: center; margin: 0 auto 18px; font-size: 28px; }
      .rhead h1 { font-family: var(--serif); font-size: 34px; line-height: 1.1; margin-bottom: 8px; }
      .rhead p { font-size: 15.5px; color: var(--mut); max-width: 440px; margin: 0 auto; }
      .reveal-h { font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--mut); margin: 28px 0 6px; }
      .reveal-sub { font-size: 14px; color: var(--mut); margin-bottom: 16px; }
      .reveal-sub b { color: var(--ink); font-weight: 600; }
      .arts { display: grid; gap: 12px; }
      .art { background: var(--card); border: 1px solid var(--line2); border-radius: 14px; padding: 16px; }
      .art .ah { display: flex; align-items: center; gap: 9px; margin-bottom: 5px; flex-wrap: wrap; }
      .art h3 { font-size: 15px; font-weight: 650; }
      .art .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.03em; padding: 2px 8px; border-radius: 999px; }
      .badge.chain { color: var(--acc); background: rgba(200,80,30,0.1); }
      .badge.enc { color: var(--vio); background: rgba(109,91,208,0.1); }
      .badge.priv { color: var(--blu); background: rgba(47,111,214,0.1); }
      .art .pv { font-size: 13px; color: var(--body); margin-bottom: 11px; line-height: 1.55; }
      .art .pv b { color: var(--ink); font-weight: 600; }
      .val { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; background: #faf8f3; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; display: flex; align-items: center; gap: 10px; justify-content: space-between; word-break: break-all; }
      .val + .val { margin-top: 7px; }
      .val a { color: var(--blu); }
      .copy { cursor: pointer; color: var(--mut2); border: 1px solid var(--line2); border-radius: 6px; padding: 3px 9px; font-size: 11px; flex: 0 0 auto; user-select: none; }
      .copy:hover { color: var(--ink); }
      .confbadge { font-size: 11.5px; font-family: ui-monospace, monospace; padding: 2px 9px; border-radius: 999px; flex: 0 0 auto; }
      .confbadge.pending { color: var(--acc); background: rgba(200,80,30,0.1); }
      .confbadge.done { color: var(--grn); background: rgba(47,158,91,0.12); }
      .art .fine { color: var(--mut2); font-size: 11.5px; margin-top: 8px; }
      .contrast { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin-top: 16px; }
      .contrast h4 { font-size: 14px; margin-bottom: 8px; }
      .contrast ul { list-style: none; display: grid; gap: 6px; }
      .contrast li { font-size: 13px; color: var(--body); display: flex; align-items: center; gap: 9px; }
      .contrast li .x { color: #c5402a; font-weight: 700; flex: 0 0 auto; }
      .honesty { color: var(--mut2); font-size: 12px; font-style: italic; margin: 16px 2px 0; line-height: 1.5; }
      .rcta { display: flex; gap: 12px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }

      /* drawer + toast */
      .scrim { position: fixed; inset: 0; background: rgba(28,27,24,0.32); z-index: 60; animation: fade 0.25s ease both; }
      .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 92vw; background: var(--bg); z-index: 61; display: flex; flex-direction: column; animation: drawerIn 0.34s cubic-bezier(.2,.7,.2,1) both; box-shadow: -20px 0 50px rgba(28,27,24,0.14); }
      .drawer .dh { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; border-bottom: 1px solid var(--line); }
      .drawer .dh h2 { font-family: var(--serif); font-size: 24px; }
      .drawer .x { background: none; border: 0; cursor: pointer; padding: 6px; color: var(--mut); display: flex; }
      .drawer .x:hover { color: var(--ink); }
      .drawer .items { flex: 1; overflow-y: auto; padding: 4px 24px; }
      .crow { display: flex; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--line); }
      .crow .ph { width: 70px; height: 86px; border-radius: 10px; flex-shrink: 0; position: relative; overflow: hidden; }
      .crow .obj { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--serif); font-style: italic; font-size: 15px; color: rgba(28,27,24,0.22); }
      .crow .nm { font-family: var(--serif); font-size: 16px; line-height: 1.2; }
      .crow .by { font-size: 13px; color: var(--mut); margin-top: 3px; }
      .qty { display: flex; align-items: center; gap: 2px; border: 1px solid var(--line2); border-radius: 8px; overflow: hidden; }
      .qty button { background: #fff; border: 0; cursor: pointer; width: 30px; height: 30px; display: grid; place-items: center; color: var(--ink); }
      .qty button:hover { background: rgba(28,27,24,0.05); }
      .qty span { min-width: 24px; text-align: center; font-weight: 600; font-size: 14px; }
      .drawer .foot { padding: 20px 24px; border-top: 1px solid var(--line2); background: var(--panel); }
      .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
      .toast { position: fixed; bottom: 28px; left: 50%; z-index: 80; background: var(--ink); color: var(--bg); font-weight: 500; font-size: 14px; padding: 13px 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(28,27,24,0.25); animation: toastIn 0.3s cubic-bezier(.2,.7,.2,1) both; display: flex; align-items: center; gap: 10px; }
      .toast svg { color: var(--acc); }

      /* Below full-desktop, drop the trust explanations + "powered by" so the labels stay
         centered with comfortable side margins instead of stretching edge-to-edge. */
      @media (max-width: 1320px) { .trust .exp, .trust .pow { display: none; } .trust .wrap { gap: 26px; } }
      @media (max-width: 1000px) {
        header.site .bar { gap: 14px; }
        .search { max-width: 380px; }
      }
      @media (max-width: 760px) {
        .search { max-width: 240px; }
        .trust .wrap { gap: 18px; }
      }
      @media (max-width: 880px) {
        .hero { grid-template-columns: 1fr; gap: 28px; padding: 40px 0 36px; }
        .hero h1 { font-size: 46px; }
        .pdp .split, .checkout .split { grid-template-columns: 1fr; gap: 28px; }
        .gallery { position: static; }
        .simgrid { grid-template-columns: repeat(2,1fr); }
        footer.site .cols { grid-template-columns: 1fr 1fr; }
      }
      @media (max-width: 560px) {
        .wrap, .pdp, .checkout { padding-left: 16px; padding-right: 16px; }
        .search { display: none; }
        .hero h1 { font-size: 38px; }
        .grid { grid-template-columns: repeat(2, 1fr); gap: 20px 14px; }
        .simgrid { grid-template-columns: repeat(2,1fr); }
        .trust .wrap { gap: 12px; font-size: 11.5px; }
      }
    </style>
  </head>
  <body>
    <header class="site">
      <div class="wrap bar">
        <button class="logo" data-act="home"><b>Parcel</b><b class="o">21</b></button>
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#76726A" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input id="q" placeholder="Search for anything…" autocomplete="off" />
        </div>
        <nav class="head">
          <button class="btn-sell" data-act="sell"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="sell-t">Sell</span></button>
          <button class="ic-btn" data-act="saved"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg><span id="savedBadge"></span></button>
          <button class="ic-btn" data-act="cart"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span id="cartBadge"></span></button>
          <div class="avatar">JL</div>
        </nav>
      </div>
      <div class="trust">
        <div class="wrap">
          <span class="t"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> <b>Private payments</b><span class="exp"> — the marketplace never sees them</span></span>
          <span class="t"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> <b>Settled on Bitcoin</b><span class="exp"> — final and unstoppable</span></span>
          <span class="t"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> <b>No platform fee</b><span class="exp"> — you pay the seller, not us</span></span>
          <span class="pow">powered by RGB over Nostr</span>
        </div>
      </div>
    </header>

    <div id="main"></div>
    <div id="drawer"></div>
    <div id="toast"></div>

    <script>
      const $ = (s) => document.querySelector(s)
      const PRODUCTS = [
        {id:1,name:"Rolleiflex 2.8F Twin-Lens",obj:"Camera",cat:"Cameras",price:1240,cond:"Vintage",seller:"Atelier Mori",city:"Kyoto",rating:4.9,sales:"1,204",ship:"+ $18 shipping",tint:"#EAE3D7",desc:"A meticulously serviced twin-lens reflex with crisp Planar glass. Recently cleaned, lubricated and adjusted — ready for a lifetime more."},
        {id:2,name:"Walnut Lounge Chair & Ottoman",obj:"Chair",cat:"Home & Living",price:890,cond:"Good",seller:"Field & Form",city:"Portland",rating:4.8,sales:"870",ship:"Local pickup only",tint:"#DCE4DD",desc:"Walnut shell and aniline leather in a timeless silhouette. Honest patina, structurally perfect. A chair to be handed down."},
        {id:3,name:"HHKB Pro Hybrid Keyboard",obj:"Keyboard",cat:"Electronics",price:210,cond:"Like new",seller:"Keebs Co",city:"Austin",rating:5.0,sales:"332",ship:"Free shipping",tint:"#DBE0E7",desc:"Topre electrostatic capacitive switches, barely used. Quiet, precise and endlessly tweakable. Includes original box and cable."},
        {id:4,name:"Hand-thrown Stoneware Vase",obj:"Vase",cat:"Art",price:64,cond:"New",seller:"Clay & Co",city:"Asheville",rating:4.9,sales:"540",ship:"+ $9 shipping",tint:"#ECE4D6",desc:"Wheel-thrown stoneware finished in a soft matte oatmeal glaze. One of a small studio batch — quietly imperfect, entirely original."},
        {id:5,name:"1968 Omega Seamaster",obj:"Watch",cat:"Watches",price:1980,cond:"Good",seller:"Horology House",city:"New York",rating:4.7,sales:"2,110",ship:"Free shipping",tint:"#E1DDD6",desc:"A 1968 Seamaster on a fresh leather strap. Runs strong and keeps excellent time. Light honest wear consistent with its age."},
        {id:6,name:"Reynolds 531 Road Bike",obj:"Bicycle",cat:"Outdoors",price:620,cond:"Good",seller:"Cogset",city:"Minneapolis",rating:4.8,sales:"415",ship:"Local pickup only",tint:"#D9E2DC",desc:"Classic steel frame in Reynolds 531 tubing, freshly tuned. A fast, forgiving everyday ride with decades left in it."},
        {id:7,name:"Camel Wool Overcoat",obj:"Coat",cat:"Fashion",price:145,cond:"Like new",seller:"The Mend",city:"London",rating:4.9,sales:"690",ship:"+ $12 shipping",tint:"#EBE6DC",desc:"Pure wool in a classic camel, with tailored shoulders and a clean drape. Worn twice — essentially new, minus the price."},
        {id:8,name:"Blue Note First Pressing LP",obj:"Vinyl",cat:"Music",price:88,cond:"Vintage",seller:"Groove Merchant",city:"San Francisco",rating:4.8,sales:"1,540",ship:"+ $6 shipping",tint:"#E6DEE2",desc:"An original Blue Note pressing with light surface marks that play through beautifully. Deep groove, the way it was meant to sound."},
        {id:9,name:"Anglepoise Task Lamp",obj:"Lamp",cat:"Home & Living",price:130,cond:"Good",seller:"Field & Form",city:"Portland",rating:4.8,sales:"870",ship:"+ $14 shipping",tint:"#EAE3D7",desc:"The original spring-balanced task lamp, rewired and ready. Patinated in all the right places. Built to outlast everything on your desk."},
        {id:10,name:"Leica Summicron 50mm f/2",obj:"Lens",cat:"Cameras",price:1450,cond:"Like new",seller:"Atelier Mori",city:"Kyoto",rating:4.9,sales:"1,204",ship:"Free shipping",tint:"#DBE0E7",desc:"A reference 50mm with clean, clear optics and that unmistakable rendering. The portrait lens by which others are measured."},
        {id:11,name:"Large Monstera Deliciosa",obj:"Plant",cat:"Outdoors",price:48,cond:"New",seller:"Leaf & Co",city:"Austin",rating:5.0,sales:"280",ship:"Local pickup only",tint:"#D9E2DC",desc:"An established split-leaf monstera in a terracotta pot. Thriving, well-rooted and ready to take over a sunny corner."},
        {id:12,name:"First-Edition Hardcover Set",obj:"Books",cat:"Books",price:260,cond:"Vintage",seller:"Marginalia",city:"Boston",rating:4.9,sales:"360",ship:"+ $10 shipping",tint:"#ECE4D6",desc:"A matched first-edition set kept in protected jackets. Collector grade, clean interiors, and the kind of spines that anchor a shelf."}
      ]
      const CATS = ["All","Cameras","Home & Living","Fashion","Electronics","Watches","Art","Music","Outdoors","Books"]
      const ST = { screen:"home", activeId:null, category:"All", query:"", sort:"trending", saved:[], cart:{}, drawer:false, pay:null, beats:{}, result:null }
      let CFG = {}

      const fmt = (n) => "$" + n.toLocaleString("en-US")
      const initials = (s) => s.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()
      const prod = (id) => PRODUCTS.find(p=>p.id===id)
      const esc = (s) => String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
      const sheen = (light) => `<div class="sheen"></div>`
      const phImg = (p) => `<img class="phimg" src="images/p${p.id}.jpg" alt="${esc(p.name)}" loading="lazy" onerror="this.remove()">`
      const trunc = (s,n=9) => (s&&s.length>n*2 ? s.slice(0,n)+"…"+s.slice(-n) : s||"")

      function filtered() {
        let list = PRODUCTS.slice()
        if (ST.category==="__saved") list = list.filter(p=>ST.saved.includes(p.id))
        else if (ST.category!=="All") list = list.filter(p=>p.cat===ST.category)
        const q = ST.query.trim().toLowerCase()
        if (q) list = list.filter(p=>(p.name+" "+p.cat+" "+p.obj+" "+p.seller).toLowerCase().includes(q))
        if (ST.sort==="low") list.sort((a,b)=>a.price-b.price)
        else if (ST.sort==="high") list.sort((a,b)=>b.price-a.price)
        return list
      }
      const cartCount = () => Object.values(ST.cart).reduce((a,b)=>a+b,0)
      const cartList = () => Object.keys(ST.cart).map(id=>({p:prod(+id),qty:ST.cart[id]}))
      const subtotal = () => cartList().reduce((s,{p,qty})=>s+p.price*qty,0)

      // ---------- views ----------
      function cardHTML(p) {
        const saved = ST.saved.includes(p.id)
        const heart = saved
          ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="${'var(--acc)'}" stroke="${'var(--acc)'}" stroke-width="1.6" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1C1B18" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`
        return `<article class="card" data-act="open" data-id="${p.id}">
          <div class="ph" style="background:${p.tint}">${phImg(p)}<span class="cat">${esc(p.cat)}</span>
            <button class="heart" data-act="save" data-id="${p.id}">${heart}</button></div>
          <div class="meta"><div class="top"><h3 class="nm">${esc(p.name)}</h3><span class="pr">${fmt(p.price)}</span></div>
            <div class="cond"><span>${esc(p.cond)}</span><span class="d">·</span><span>${esc(p.seller)}</span></div>
            <div class="ship">${esc(p.ship)}</div></div></article>`
      }

      function homeHTML() {
        const list = filtered()
        const showHero = ST.category==="All" && !ST.query
        const f = PRODUCTS[0]
        const hero = showHero ? `<section class="hero">
          <div><div class="eyebrow"><span></span>A private marketplace</div>
            <h1>Things worth <span class="ital">keeping</span>.<br>Money that stays <span class="ital">yours</span>.</h1>
            <p>Buy and sell cameras, furniture, watches and the well-made rest — and pay the seller directly: private, settled on Bitcoin, with no platform in the middle.</p>
            <div class="cta"><button class="btn-dark" data-act="scrollfeed">Explore the edit</button><button class="btn-ghost" data-act="sell">Start selling</button></div></div>
          <button class="feat" style="background:${f.tint}" data-act="open" data-id="${f.id}">${phImg(f)}<span class="cat">${esc(f.cat)}</span>
            <div class="cap"><div class="k">Editor's pick</div><div class="n">${esc(f.name)}</div><div class="pr">${fmt(f.price)}</div></div></button>
        </section>` : ""
        const cats = CATS.map(c=>`<button class="chip ${ST.category===c?'on':''}" data-act="cat" data-cat="${esc(c)}">${esc(c)}</button>`).join("")
        const title = ST.category==="__saved" ? "Saved items" : ST.query ? "Results" : ST.category==="All" ? "Browse the marketplace" : ST.category
        const feed = list.length
          ? `<div class="grid">${list.map(cardHTML).join("")}</div>`
          : `<div style="text-align:center;padding:80px 0;"><div class="serif ital" style="font-size:26px;margin-bottom:8px;">Nothing here yet.</div><div style="color:var(--mut);margin-bottom:20px;">Try another search or category.</div><button class="btn-dark" data-act="clear">Clear filters</button></div>`
        return `<main><div class="wrap">${hero}</div>
          <div class="catbar"><div class="wrap" style="padding:0;"><div class="row">${cats}</div></div></div>
          <div class="wrap"><div class="feedhead"><div><h2>${esc(title)}</h2><div class="sub">${list.length} ${list.length===1?'listing':'listings'}</div></div>
            <div class="sortwrap"><span>Sort</span><div style="position:relative;display:flex;align-items:center;"><select id="sort"><option value="trending"${ST.sort==='trending'?' selected':''}>Trending</option><option value="low"${ST.sort==='low'?' selected':''}>Price: Low to High</option><option value="high"${ST.sort==='high'?' selected':''}>Price: High to Low</option></select>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1C1B18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div></div></div>
            ${feed}</div>${footerHTML()}</main>`
      }
      function footerHTML() {
        return `<footer class="site"><div class="cols">
          <div><div class="logo" style="cursor:default"><b>Parcel</b><b class="o">21</b></div><p class="blurb">Buy and sell things worth keeping, with payments that settle privately on Bitcoin — straight to the seller.</p></div>
          <div><div class="ch">Marketplace</div><div class="lk"><span>Browse all</span><span>Categories</span><span>Featured sellers</span><span>New arrivals</span></div></div>
          <div><div class="ch">How payments work</div><div class="lk"><a href="https://github.com/node21labs/parcel21" target="_blank" rel="noopener">Private by design</a><a href="https://github.com/node21labs/parcel21/blob/main/docs/architecture.md" target="_blank" rel="noopener">Settled on Bitcoin</a><a href="https://github.com/node21labs/parcel21/tree/main/spec" target="_blank" rel="noopener">The protocol</a></div></div>
          <div><div class="ch">Company</div><div class="lk"><span>About</span><span>Trust &amp; safety</span><span>Help center</span><span>Contact</span></div></div>
        </div><div class="legal"><span>© 2026 Parcel21 · test network demo</span><span>powered by RGB over Nostr</span></div></footer>`
      }

      function productHTML() {
        const p = prod(ST.activeId); if (!p) return homeHTML()
        const saved = ST.saved.includes(p.id)
        const favIcon = saved
          ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="var(--acc)" stroke="var(--acc)" stroke-width="1.6" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`
          : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1C1B18" stroke-width="1.7" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>`
        const sim = PRODUCTS.filter(x=>x.cat===p.cat&&x.id!==p.id).concat(PRODUCTS.filter(x=>x.cat!==p.cat)).slice(0,4)
        const thumbs = [0,1,2,3].map(()=>`<div class="thumb" style="background:${p.tint}">${phImg(p)}</div>`).join("")
        const simHTML = sim.map(s=>`<article class="card" data-act="open" data-id="${s.id}"><div class="ph" style="background:${s.tint};aspect-ratio:4/5">${phImg(s)}</div><div class="meta"><div class="top"><h3 class="nm" style="font-size:16px">${esc(s.name)}</h3><span class="pr" style="font-size:15px">${fmt(s.price)}</span></div></div></article>`).join("")
        return `<main><div class="pdp">
          <button class="back" data-act="home"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back to browse</button>
          <div class="split">
            <div class="gallery"><div class="main" style="background:${p.tint}">${phImg(p)}<span style="position:absolute;top:18px;left:18px;z-index:2;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#46443f;background:rgba(255,255,255,0.86);padding:5px 10px;border-radius:8px;backdrop-filter:blur(6px)">${esc(p.cat)}</span></div><div class="thumbs">${thumbs}</div></div>
            <div class="pinfo">
              <div class="tags"><span class="cat">${esc(p.cat)}</span><span class="cond">${esc(p.cond)}</span></div>
              <h1>${esc(p.name)}</h1>
              <div class="price"><b>${fmt(p.price)}</b><span class="s">${esc(p.ship)}</span></div>
              <p class="desc">${esc(p.desc)}</p>
              <div class="acts">
                <button class="btn-buy" data-act="buy" data-id="${p.id}">Buy it now</button>
                <button class="btn-cart" data-act="addcart" data-id="${p.id}">Add to cart</button>
                <button class="btn-fav" data-act="save" data-id="${p.id}">${favIcon}</button>
              </div>
              <button class="btn-offer" data-act="offer">Make an offer</button>
              <div class="seller"><div class="av" style="background:${p.tint}">${initials(p.seller)}</div>
                <div style="flex:1"><div class="nm">${esc(p.seller)}<svg width="15" height="15" viewBox="0 0 24 24" fill="var(--acc)" stroke="none"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4-4.8-2.5-4.8 2.5.9-5.4L4.2 7.7l5.4-.8z"/></svg></div><div class="meta">${esc(p.city)} · ${p.rating} ★ · ${p.sales} sold</div></div>
                <button class="store">View store</button></div>
              <div class="trustrow">
                <div class="r"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><div><b>Private checkout.</b> The marketplace never sees the amount, the item, or who you are.</div></div>
                <div class="r"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><div><b>Settled on Bitcoin.</b> Your payment goes straight to the seller — final, and impossible to freeze.</div></div>
                <div class="r"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div><b>No platform fee.</b> You pay the seller, not a middleman taking a cut.</div></div>
              </div>
            </div></div>
          <div class="similar"><h2>You might also like</h2><div class="simgrid">${simHTML}</div></div>
        </div></main>`
      }

      function checkoutHTML() {
        const p = prod(ST.activeId) || cartList()[0]?.p; if (!p) return homeHTML()
        const total = ST.activeId ? p.price : subtotal()
        const ship = 0
        const running = !!ST.pay
        const payPanel = running
          ? `<div class="pay"><h3 class="serif" style="font-size:20px;margin-bottom:4px">Paying ${esc(p.seller)} privately…</h3><div class="beats" id="beats">${beatsMarkup(p)}</div></div>`
          : `<div class="pay"><h3 class="serif" style="font-size:20px">Pay ${esc(p.seller)} directly</h3>
              <p class="lede">No card, no PayPal, no platform fee. Your payment goes <b>straight to the seller</b>, encrypted and settled on Bitcoin. The marketplace never sees the amount, the item, or who you are.</p>
              <div class="payways">
                <div class="payway on"><div class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><div class="t"><b>Parcel21 private pay</b><span>direct to seller · on Bitcoin · no fee</span></div><span class="pick">SELECTED</span></div>
                <div class="payway"><div class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div><div class="t"><b>Card</b><span>seen by the processor, the platform, and the bank</span></div></div>
              </div>
              <button class="btn-pay" data-act="pay">Pay ${fmt(total)} privately</button>
              <div class="demo-note">Live demo — this settles a real <b>$1</b> payment on Bitcoin's test network to show exactly how Parcel21 pays a seller. No real funds move, no goods ship.</div></div>`
        return `<main><div class="checkout">
          <button class="back" data-act="${ST.activeId?'openback':'home'}" data-id="${p.id}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>Back</button>
          <h1 class="serif" style="font-size:34px;margin-bottom:24px">Checkout</h1>
          <div class="split">
            <div class="summary"><h3>Order summary</h3>
              <div class="sitem"><div class="ph" style="background:${p.tint}">${phImg(p)}</div>
                <div><div class="nm">${esc(p.name)}</div><div class="by">${esc(p.cond)} · ${esc(p.seller)} · ${esc(p.city)}</div></div></div>
              <div class="srow"><span>Item</span><span>${fmt(total)}</span></div>
              <div class="srow"><span>Shipping</span><span>${esc(p.ship)}</span></div>
              <div class="srow"><span>Platform fee</span><span style="color:var(--grn)">$0 — none</span></div>
              <div class="srow total"><span>Total</span><span>${fmt(total)}</span></div></div>
            ${payPanel}
          </div></div></main>`
      }

      function receiptHTML() {
        const r = ST.result, p = prod(ST.activeId) || (r && r._product) || PRODUCTS[0]
        if (!r) return homeHTML()
        const bitcoin = `<div class="art"><div class="ah"><h3>Your payment settled on Bitcoin</h3><span class="badge chain">PUBLIC · ON-CHAIN</span></div>
          <p class="pv">A permanent, public record that the money moved. The marketplace can't reverse it, hold it, or freeze it. Check it yourself:</p>
          <div class="val"><a href="${r.explorerUrl}" target="_blank" rel="noopener">${trunc(r.bitcoinTxid,12)}</a><span class="confbadge pending" data-txid="${r.bitcoinTxid}">checking…</span></div></div>`
        const nostr = `<div class="art"><div class="ah"><h3>All the network ever saw</h3><span class="badge enc">ENCRYPTED · KIND 1059</span></div>
          <p class="pv">This is the actual message that carried your payment across the internet. Open it — it's encrypted gibberish. The relay, the marketplace, anyone watching: all they see is <b>this</b>. Not the price, not the item, not you.</p>
          <div class="val"><a href="${r.nostrGuruUrl}" target="_blank" rel="noopener">open the message — see only ciphertext</a><span class="copy" data-copy="${r.nostrGuruUrl}">copy</span></div>
          <div class="fine">event ${trunc(r.nostrEventId,7)} · ${r.consignmentBytes.toLocaleString()} bytes, encrypted</div></div>`
        const rgb = `<div class="art"><div class="ah"><h3>The consignment</h3><span class="badge priv">PRIVATE · CLIENT-SIDE</span></div>
          <p class="pv">In a marketplace, a <b>consignment</b> is goods handed over to be sold. Here it's the cryptographic proof of the payment — and it lives only on your device and the seller's, never on a server. There's no explorer to link, and that is the privacy.</p>
          <div class="val"><span>${esc(r.contractId)}</span><span class="copy" data-copy="${esc(r.contractId)}">copy</span></div></div>`
        return `<main><div class="receipt">
          <div class="rhead"><div class="ck">✓</div><h1>Paid — ${esc(p.name)} is yours</h1>
            <p>You paid ${esc(p.seller)} directly. Private, final, and settled on Bitcoin in seconds — with no platform in the middle.</p></div>
          <div class="reveal-h">Where did the money actually go?</div>
          <div class="reveal-sub">None of that was pretend. Here is the real, public evidence — and notice what is <b>missing</b> from it.</div>
          <div class="arts">${bitcoin}${nostr}${rgb}</div>
          <div class="contrast"><h4>What a normal marketplace checkout would have leaked — and this didn't:</h4>
            <ul><li><span class="x">✕</span> your card number and billing details</li><li><span class="x">✕</span> the price and exactly what you bought</li><li><span class="x">✕</span> who you are and who you paid</li><li><span class="x">✕</span> a 10–15% platform + processor fee</li></ul></div>
          <p class="honesty">${esc(p.seller)} and the ${esc(p.name)} are an illustration. The Bitcoin transaction, the Nostr message, and the consignment above are 100% real — go check them.</p>
          <div class="rcta"><button class="btn-dark" data-act="home">Keep shopping</button><a class="btn-ghost" href="https://github.com/node21labs/parcel21" target="_blank" rel="noopener" style="display:inline-flex;align-items:center">How this works</a></div>
        </div></main>`
      }

      function drawerHTML() {
        if (!ST.drawer) return ""
        const items = cartList()
        const body = items.length
          ? `<div class="items p21-scroll">${items.map(({p,qty})=>`<div class="crow"><div class="ph" style="background:${p.tint}">${phImg(p)}</div>
              <div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;gap:8px"><h3 class="nm">${esc(p.name)}</h3><button class="x" data-act="rm" data-id="${p.id}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
              <div class="by">${esc(p.cond)} · ${esc(p.seller)}</div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:11px"><div class="qty"><button data-act="dec" data-id="${p.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button><span>${qty}</span><button data-act="inc" data-id="${p.id}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div><span style="font-weight:700;font-size:15px">${fmt(p.price*qty)}</span></div></div></div>`).join("")}</div>
            <div class="foot"><div class="srow"><span>Subtotal</span><span>${fmt(subtotal())}</span></div><div class="srow" style="margin-bottom:12px"><span>Private payment</span><span style="color:var(--grn)">no fee</span></div>
              <button class="btn-pay" data-act="checkout">Checkout privately · ${fmt(subtotal())}</button></div>`
          : `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c9c4b8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><path d="M6 2 3 6v13a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><div class="serif ital" style="font-size:22px;margin-bottom:6px">Your cart is empty</div><div style="color:var(--mut);margin-bottom:20px">Find something worth keeping.</div><button class="btn-dark" data-act="closecart">Browse the marketplace</button></div>`
        return `<div class="scrim" data-act="closecart"></div><aside class="drawer"><div class="dh"><h2>Your cart ${cartCount()?`(${cartCount()})`:''}</h2><button class="x" data-act="closecart"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>${body}</aside>`
      }

      // ---------- payment beats ----------
      const BEATS = [
        { steps:['invoice','transfer','deliver'], lab:()=>'You pay — direct to the seller', sub:'encrypted and sent over Nostr' },
        { steps:['received','validate','ack'], lab:(p)=>`${p.seller}'s wallet verifies the money`, sub:'checked on the spot, peer to peer' },
        { steps:['broadcast','accept'], lab:(p)=>`${p.seller} is paid`, sub:'settled for good on Bitcoin' },
      ]
      function beatStatus(b) {
        const s = b.steps.map(k=>ST.beats[k]||'')
        if (s.some(x=>x==='error')) return 'error'
        if (s.every(x=>x==='ok')) return 'ok'
        if (s.some(x=>x==='ok'||x==='running')) return 'run'
        return ''
      }
      function beatsMarkup(p) {
        return BEATS.map(b=>{
          const st = beatStatus(b)
          const ic = st==='ok'?'✓':st==='error'?'✕':''
          return `<div class="beat ${st}"><span class="bic">${ic}</span><div><div class="bl">${b.lab(p)}</div><div class="bs">${b.sub}</div></div></div>`
        }).join("")
      }
      // Update only the beats during a payment so the page (and the product image) doesn't re-render.
      function paintBeats() {
        const el = document.getElementById('beats')
        if (el && ST._payP) el.innerHTML = beatsMarkup(ST._payP)
      }

      // ---------- render ----------
      function badges() {
        $('#savedBadge').className = ST.saved.length ? 'ic-badge' : ''
        $('#savedBadge').textContent = ST.saved.length || ''
        $('#cartBadge').className = cartCount() ? 'ic-badge' : ''
        $('#cartBadge').textContent = cartCount() || ''
      }
      function render(scrollTop) {
        const v = ST.screen==='product' ? productHTML() : ST.screen==='checkout' ? checkoutHTML() : ST.screen==='receipt' ? receiptHTML() : homeHTML()
        $('#main').innerHTML = v
        $('#drawer').innerHTML = drawerHTML()
        badges()
        bindResultActions()
        if (scrollTop) window.scrollTo(0,0)
      }
      function toast(msg) {
        $('#toast').innerHTML = `<div class="toast"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${esc(msg)}</div>`
        clearTimeout(window._tt); window._tt = setTimeout(()=>{$('#toast').innerHTML=''}, 2200)
      }

      function bindResultActions() {
        document.querySelectorAll('.copy').forEach(el=>el.addEventListener('click',()=>{ navigator.clipboard?.writeText(el.dataset.copy); const t=el.textContent; el.textContent='copied'; setTimeout(()=>el.textContent=t,1100) }))
        const badge = document.querySelector('.confbadge')
        if (badge && ST.result) pollConfirmation(ST.result.bitcoinTxid, badge)
        const sort = $('#sort'); if (sort) sort.addEventListener('change', e=>{ ST.sort=e.target.value; render() })
      }

      async function pollConfirmation(txid, badge) {
        const api = CFG.explorerApi; if (!api) { badge.remove(); return }
        for (let i=0;i<40;i++) {
          try {
            const s = await (await fetch(`${api}/tx/${txid}/status`)).json()
            if (s.confirmed) { badge.className='confbadge done'; badge.textContent=`confirmed · block ${s.block_height.toLocaleString()}`; return }
            badge.textContent = 'settling on Bitcoin…'
          } catch {}
          await new Promise(r=>setTimeout(r,6000))
        }
      }

      // ---------- actions ----------
      function open(id) { ST.activeId=id; ST.screen='product'; render(true) }
      function go(screen) { ST.screen=screen; render(true) }
      function save(id) { const i=ST.saved.indexOf(id); if(i<0){ST.saved.push(id);toast('Saved to your list')} else ST.saved.splice(i,1); render() }
      function addCart(id){ ST.cart[id]=(ST.cart[id]||0)+1; render() }

      async function pay() {
        // No wait on /health here — the server enforces readiness on /run, so the button stays instant.
        ST._payP = prod(ST.activeId) || cartList()[0]?.p
        ST.pay = true; ST.beats = {}; render()
        let jobId
        for (let attempt = 0; attempt < 4; attempt++) {
          let res
          try { res = await fetch('/run', { method:'POST' }) } catch { ST.pay=null; toast('Could not reach the payment rail'); render(); return }
          if (res.status === 429) { // finishing the previous payment — wait and retry quietly, no error
            const b = await res.json().catch(()=>({}))
            await new Promise(r=>setTimeout(r, Math.min(b.retryAfterMs || 4000, 8000) + 300))
            continue
          }
          if (res.status === 503) { ST.pay=null; toast('Payment rail is warming up — try again in a moment'); render(); return }
          if (!res.ok) { const b=await res.json().catch(()=>({})); ST.pay=null; toast(b.error||'Payment failed'); render(); return }
          jobId = (await res.json()).jobId
          break
        }
        if (!jobId) { ST.pay=null; toast('The payment rail is busy — try again in a moment'); render(); return }
        const proto = location.protocol==='https:'?'wss':'ws'
        const ws = new WebSocket(`${proto}://${location.host}/run/${jobId}/stream`)
        ws.onmessage = (m) => {
          const msg = JSON.parse(m.data)
          if (msg.type==='progress') { if (msg.event.step!=='start'){ ST.beats[msg.event.step]=msg.event.status; if(ST.screen==='checkout') paintBeats() } }
          else if (msg.type==='result') { ST.result = {...msg.result, _product: ST._payP}; ST.pay=null; ST.screen='receipt'; render(true) }
          else if (msg.type==='error') { ST.pay=null; toast('Payment failed: '+msg.error); render() }
        }
        ws.onerror = () => { ST.pay=null; toast('The payment stream dropped'); render() }
      }

      document.addEventListener('click', (e) => {
        const t = e.target.closest('[data-act]'); if (!t) return
        const act = t.dataset.act, id = t.dataset.id ? +t.dataset.id : null
        if (act!=='save'&&act!=='inc'&&act!=='dec'&&act!=='rm') e.preventDefault?.()
        switch (act) {
          case 'home': ST.screen='home'; ST.category='All'; ST.query=''; $('#q').value=''; render(true); break
          case 'open': open(id); break
          case 'openback': open(id); break
          case 'save': e.stopPropagation(); save(id); break
          case 'cat': ST.category=t.dataset.cat; render(); break
          case 'clear': ST.category='All'; ST.query=''; $('#q').value=''; render(); break
          case 'saved': ST.category='__saved'; ST.query=''; ST.screen='home'; render(true); break
          case 'sell': toast('Listing flow — coming soon in this demo'); break
          case 'offer': toast('Offer sent to the seller'); break
          case 'scrollfeed': document.querySelector('.catbar')?.scrollIntoView({behavior:'smooth',block:'start'}); break
          case 'addcart': addCart(id); toast('Added to cart'); break
          case 'buy': ST.activeId=id; ST.screen='checkout'; ST.pay=null; render(true); break
          case 'cart': ST.drawer=true; render(); break
          case 'closecart': ST.drawer=false; render(); break
          case 'checkout': ST.drawer=false; ST.activeId=null; ST.screen='checkout'; ST.pay=null; render(true); break
          case 'inc': addCart(id); break
          case 'dec': if(ST.cart[id]>1)ST.cart[id]--; else delete ST.cart[id]; render(); break
          case 'rm': delete ST.cart[id]; render(); break
          case 'pay': pay(); break
        }
      })
      $('#q').addEventListener('input', (e) => { ST.query=e.target.value; if(ST.screen!=='home'){ST.screen='home'} render() })

      async function health() {
        try { CFG = await (await fetch('/health')).json() } catch { CFG = {} }
      }
      render()   // render the marketplace immediately from static data — don't wait on /health
      health()   // populate CFG (ready state, explorer API) for checkout in the background
    </script>
  </body>
</html>
